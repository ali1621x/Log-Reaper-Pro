<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPER ENGINE PRO</title>
    <style>
        :root { --main: #00ff41; --bg: #0d0d0d; --accent: #ff003c; }
        body { background: var(--bg); color: var(--main); font-family: 'Consolas', monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 300px 1fr; gap: 20px; flex-grow: 1; min-height: 0; }
        textarea { background: #1a1a1a; color: var(--main); border: 1px solid #333; padding: 15px; resize: none; font-size: 12px; }
        .controls { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 10px; }
        button { background: #222; color: var(--main); border: 1px solid var(--main); padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        button:hover { background: var(--main); color: #000; box-shadow: 0 0 15px var(--main); }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { background: #1a1a1a; border: 1px solid var(--accent); color: var(--accent); padding: 10px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>
    <div class="header"><h1>[ LOG-REAPER ENGINE V2 ]</h1></div>
    <div class="grid">
        <textarea id="input" placeholder="HAM LOGLARI BURAYA YAPIŞTIR..."></textarea>
        <div class="controls">
            <input type="text" id="keyword" placeholder="FİLTRE ANAHTAR KELİME">
            <button onclick="run('rem_dup')">Remove Duplicate</button>
            <button onclick="run('get_dup')">Get Duplicate</button>
            <button onclick="run('sort')">Sort Lines</button>
            <button onclick="run('random')">Randomize</button>
            <button onclick="run('rem_capture')">Capture Remover</button>
            <button onclick="run('email_to_user')">Email:Pass -> User:Pass</button>
            <button onclick="run('extract_email')">Extract Emails</button>
            <button onclick="run('filter')">Combo Filter</button>
            <button onclick="copyResult()" style="border-color: var(--accent); color: var(--accent);">SONUCU KOPYALA</button>
        </div>
        <textarea id="output" readonly placeholder="SONUÇ BURADA BELİRECEK..."></textarea>
    </div>

    <script>
        async function run(action) {
            const data = document.getElementById('input').value;
            const keyword = document.getElementById('keyword').value;
            if(!data) return alert("Veri gir kanka!");
            
            const res = await fetch('/api/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data, action, keyword})
            });
            const json = await res.json();
            document.getElementById('output').value = json.result;
            console.log("İşlem tamamlanan: " + json.count);
        }
        function copyResult() {
            const out = document.getElementById('output');
            out.select();
            document.execCommand('copy');
            alert("Kopyalandı!");
        }
    </script>
</body>
</html>
